<!-- Audit Panel (Django + Frontend, shared template) -->
<div class="bg-slate-900 rounded-2xl p-8 border border-slate-700/50 space-y-6"
     style="box-shadow:0 4px 32px rgba(0,0,0,0.4)">

  <h2 class="text-xl font-bold text-slate-100">{{ title }}</h2>

  <!-- input -->
  <div class="flex gap-3 items-end flex-wrap">
    <div class="flex-1 min-w-64">
      <label class="block text-sm font-semibold text-slate-300 mb-1.5">
        Caminho do projeto
      </label>
      <input x-model="path" type="text"
             placeholder="{{ placeholder }}"
             class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 font-mono focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition-all" />
    </div>
    <button @click="run()" :disabled="loading"
      class="px-6 py-2.5 bg-brand-600 hover:bg-brand-500 disabled:opacity-50 text-white text-sm font-bold rounded-lg transition-colors"
      style="box-shadow:0 0 16px rgba(99,102,241,0.25)">
      <span x-text="loading ? 'Analisando…' : 'Analisar'"></span>
    </button>
  </div>

  <!-- error -->
  <template x-if="error">
    <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-sm text-red-400" x-text="error"></div>
  </template>

  <!-- results -->
  <template x-if="result">
    <div class="space-y-5">

      <!-- summary cards -->
      <div class="grid grid-cols-3 gap-4">
        <div class="bg-slate-800/60 rounded-xl p-4 text-center border border-slate-700/40">
          <div class="text-3xl font-extrabold text-red-400" x-text="summary().high ?? 0"></div>
          <div class="text-xs text-slate-500 mt-0.5 uppercase tracking-wide">High</div>
        </div>
        <div class="bg-slate-800/60 rounded-xl p-4 text-center border border-slate-700/40">
          <div class="text-3xl font-extrabold text-yellow-400" x-text="summary().medium ?? 0"></div>
          <div class="text-xs text-slate-500 mt-0.5 uppercase tracking-wide">Medium</div>
        </div>
        <div class="bg-slate-800/60 rounded-xl p-4 text-center border border-slate-700/40">
          <div class="text-3xl font-extrabold text-sky-400" x-text="summary().low ?? 0"></div>
          <div class="text-xs text-slate-500 mt-0.5 uppercase tracking-wide">Low</div>
        </div>
      </div>

      <!-- issue list -->
      <template x-if="!issues().length">
        <div class="text-center py-12 text-emerald-400 font-semibold border border-emerald-500/20 bg-emerald-500/5 rounded-xl">
          ✓ Nenhum problema encontrado.
        </div>
      </template>

      <template x-for="(issue, idx) in issues()" :key="idx">
        <div class="bg-slate-800/60 rounded-xl border border-slate-700/40 p-5 space-y-2">
          <div class="flex items-start justify-between gap-3 flex-wrap">
            <span class="font-semibold text-slate-100 text-sm" x-text="issue.issue_text ?? issue.title ?? issue.advisory ?? 'Issue'"></span>
            <span class="text-xs font-bold px-2.5 py-1 rounded-md border uppercase"
                  :class="severityClass(issue.issue_severity ?? issue.severity)"
                  x-text="issue.issue_severity ?? issue.severity ?? '–'"></span>
          </div>
          <template x-if="issue.filename">
            <div class="text-xs font-mono bg-slate-900 border border-slate-700/50 px-3 py-1.5 rounded-lg text-slate-400 truncate"
                 x-text="issue.filename + (issue.line_number ? ':' + issue.line_number : '')"></div>
          </template>
          <template x-if="issue.more_info ?? issue.url">
            <a :href="issue.more_info ?? issue.url" target="_blank"
               class="text-xs text-brand-400 hover:underline" x-text="issue.more_info ?? issue.url"></a>
          </template>
        </div>
      </template>

    </div>
  </template>

</div>
