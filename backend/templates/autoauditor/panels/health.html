<!-- Health Score Panel -->
<div class="bg-slate-900 rounded-2xl p-8 border border-slate-700/50 space-y-6"
     style="box-shadow:0 4px 32px rgba(0,0,0,0.4)">

  <!-- loading -->
  <template x-if="loading">
    <div class="space-y-4 animate-pulse">
      <div class="h-40 bg-slate-800/60 rounded-xl"></div>
      <div class="grid grid-cols-4 gap-4">
        <template x-for="i in [1,2,3,4]"><div class="h-20 bg-slate-800/60 rounded-xl"></div></template>
      </div>
    </div>
  </template>

  <!-- error -->
  <template x-if="!loading && error">
    <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-4 text-sm text-red-400" x-text="error"></div>
  </template>

  <!-- content -->
  <template x-if="!loading && data">
    <div class="space-y-6">

      <!-- hero card -->
      <div class="bg-slate-800/40 rounded-2xl p-8 border border-slate-700/40 flex flex-col sm:flex-row items-center gap-10">
        <!-- gauge ring (CSS) -->
        <div class="relative shrink-0 flex items-center justify-center" style="width:160px;height:160px;">
          <!-- track -->
          <svg viewBox="0 0 160 160" class="absolute inset-0 rotate-[-90deg]" style="width:160px;height:160px;">
            <circle cx="80" cy="80" r="64" fill="none" stroke="#1e293b" stroke-width="14"/>
            <circle cx="80" cy="80" r="64" fill="none" stroke="#6366f1" stroke-width="14"
              stroke-dasharray="402"
              :stroke-dashoffset="402 - (402 * score / 100)"
              stroke-linecap="round"
              style="transition:stroke-dashoffset 0.8s ease;filter:drop-shadow(0 0 8px rgba(99,102,241,0.5))"/>
          </svg>
          <div class="text-center z-10">
            <div class="text-4xl font-extrabold text-slate-100" x-text="score"></div>
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mt-0.5">score</div>
          </div>
        </div>

        <!-- grade + progress -->
        <div class="flex-1 space-y-5 w-full">
          <div class="flex items-center gap-4">
            <div class="text-6xl font-black" :class="gradeColor()" :style="'filter:drop-shadow('+gradeShadow()+')'" x-text="grade"></div>
            <div>
              <div class="text-slate-100 font-bold text-xl" x-text="data.label ?? 'Health Score'"></div>
              <div class="text-slate-500 text-sm" x-text="data.description ?? ''"></div>
            </div>
          </div>
          <!-- progress bar -->
          <div>
            <div class="flex justify-between text-xs text-slate-500 mb-1.5">
              <span>Score geral</span><span x-text="score + '/100'"></span>
            </div>
            <div class="h-2.5 bg-slate-700/60 rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-brand-600 to-brand-400 rounded-full transition-all duration-700"
                   :style="'width:' + score + '%'"
                   style="box-shadow:0 0 10px rgba(99,102,241,0.4)"></div>
            </div>
          </div>
          <button @click="recalc()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-sm font-semibold rounded-lg transition-colors">
            ↻ Recalcular
          </button>
        </div>
      </div>

      <!-- metrics grid -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
        <template x-for="m in metrics()" :key="m.label">
          <div class="bg-slate-800/60 rounded-xl p-4 border border-slate-700/40">
            <div class="text-2xl font-extrabold" :class="m.color" x-text="m.value"></div>
            <div class="text-xs text-slate-400 font-semibold mt-0.5" x-text="m.label"></div>
            <div class="text-xs text-slate-600" x-text="m.sub"></div>
          </div>
        </template>
      </div>

      <!-- suites -->
      <template x-if="suites().length">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <template x-for="s in suites()" :key="s.name">
            <div class="bg-slate-900 border border-slate-700/50 rounded-xl p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="font-semibold text-slate-100 text-sm" x-text="s.name"></span>
                <span class="text-xs px-2 py-0.5 rounded-full border"
                      :class="s.pass_rate >= 80 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'"
                      x-text="(s.pass_rate ?? 0).toFixed(1) + '%'"></span>
              </div>
              <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                     :class="s.pass_rate >= 80 ? 'bg-emerald-500' : 'bg-red-500'"
                     :style="'width:' + (s.pass_rate ?? 0) + '%'"></div>
              </div>
              <div class="text-xs text-slate-500 mt-2" x-text="(s.passed ?? 0) + '/' + (s.total ?? 0) + ' testes'"></div>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>

</div>
